name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    name: Detect CI validation surface changes
    runs-on: ubuntu-latest
    outputs:
      rust_release: ${{ steps.filter.outputs.rust_release }}
      python_wrapper: ${{ steps.filter.outputs.python_wrapper }}
      workflow_definitions: ${{ steps.filter.outputs.workflow_definitions }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect files that require release validation
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflow_definitions:
              - '.github/workflows/**'
            rust_release:
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'VERSION'
              - 'crates/**'
              - 'scripts/release/**'
            python_wrapper:
              - '.github/workflows/ci.yml'
              - 'packaging/python/**'
              - 'scripts/release/**'
              - 'VERSION'
              - 'Cargo.toml'
              - 'Cargo.lock'

  validate-workflows:
    name: Validate workflow definitions
    needs:
      - changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.workflow_definitions == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  version-alignment:
    name: Verify version alignment
    needs:
      - changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust_release == 'true' || needs.changes.outputs.python_wrapper == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python, Rust workspace, and binary versions align
        run: python scripts/release/verify_version_alignment.py --repo-root .

  python-wrapper-tests:
    name: Python wrapper tests
    needs:
      - changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.python_wrapper == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python wrapper in editable mode
        run: python -m pip install --upgrade pip && python -m pip install -e packaging/python

      - name: Run Python wrapper test suite
        run: python -m unittest discover -s packaging/python/tests

  build-python-package:
    name: Build Python package
    needs:
      - version-alignment
      - python-wrapper-tests
      - changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.python_wrapper == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packaging tools
        run: python -m pip install --upgrade pip build

      - name: Build wrapper wheel and sdist
        run: python -m build packaging/python --outdir python-dist

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wrapper-dist
          path: python-dist/*

  build-release-binary:
    name: Build Linux release binary
    needs:
      - changes
      - version-alignment
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p tine-cli
