name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target platform to build
        required: false
        default: all
        type: choice
        options:
          - all
          - macos-aarch64
          - linux-x86_64
          - windows-x86_64
      publish_to_release:
        description: Upload desktop bundles to a GitHub Release after the matrix passes
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag to use when publishing from workflow_dispatch (for example v0.2.2)
        required: false
        default: ""
        type: string
      sign_linux_appimage:
        description: Enable GPG signing for Linux AppImage
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      target:
        required: false
        default: all
        type: string
      publish_to_release:
        required: false
        default: false
        type: boolean
      release_tag:
        required: false
        default: ""
        type: string
      sign_linux_appimage:
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve-build-matrix:
    name: Resolve desktop build matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.matrix.outputs.include }}
    steps:
      - name: Resolve requested matrix entries
        id: matrix
        shell: bash
        env:
          REQUESTED_TARGET: ${{ inputs.target || 'all' }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          include = [
              {
                  "label": "macos-aarch64",
                  "runner": "macos-14",
                  "artifact_glob": "target/release/bundle/dmg/*.dmg",
                  "smoke": True,
              },
              {
                  "label": "linux-x86_64",
                  "runner": "ubuntu-22.04",
                  "artifact_glob": "target/release/bundle/appimage/*.AppImage",
                  "smoke": True,
              },
              {
                  "label": "windows-x86_64",
                  "runner": "windows-latest",
                  "artifact_glob": "target/release/bundle/msi/*.msi",
                  "smoke": True,
              },
          ]

          if os.environ["REQUESTED_TARGET"] != "all":
              include = [item for item in include if item["label"] == os.environ["REQUESTED_TARGET"]]

          print(f"include={json.dumps(include)}")
          PY

  version-alignment:
    name: Verify app version alignment
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Render and verify workspace and Tauri config versions align
        run: python scripts/release/verify_version_alignment.py --repo-root . --tauri-template crates/tine-app/tauri.conf.template.json --tauri-config crates/tine-app/tauri.conf.json --write-tauri-config

  build-bundle:
    name: Build desktop app (${{ matrix.label }})
    needs:
      - resolve-build-matrix
      - version-alignment
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-build-matrix.outputs.include) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gnupg2 \
            libfuse2 \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-4.1 \
            libwebkit2gtk-4.1-dev \
            xvfb

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Fetch bundled Python runtime
        run: python scripts/release/fetch_app_runtime.py --target ${{ matrix.label }}

      - name: Render tauri.conf.json from template
        run: python scripts/release/verify_version_alignment.py --repo-root . --tauri-template crates/tine-app/tauri.conf.template.json --tauri-config crates/tine-app/tauri.conf.json --write-tauri-config

      - name: Prepare Linux AppImage signing key
        if: runner.os == 'Linux' && inputs.sign_linux_appimage
        shell: bash
        env:
          LINUX_SIGNING_KEY: ${{ secrets.LINUX_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${LINUX_SIGNING_KEY}" ]]; then
            echo "sign_linux_appimage=true requires LINUX_SIGNING_KEY" >&2
            exit 1
          fi
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$LINUX_SIGNING_KEY" | base64 --decode | gpg --batch --import
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          gpgconf --reload gpg-agent
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Prepare macOS notarization key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_CONTENT}" ]]; then
            exit 0
          fi
          KEY_PATH="$RUNNER_TEMP/app-store-connect-auth-key.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Prepare macOS signing keychain
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE}" ]]; then
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/tine-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/tine-signing-cert.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign bundled macOS runtime binaries
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_KEYCHAIN_PATH: ${{ env.APPLE_KEYCHAIN_PATH }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_SIGNING_IDENTITY}" ]]; then
            exit 0
          fi
          python scripts/release/sign_macos_runtime.py \
            --root crates/tine-app/resources/runtime/python \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --keychain "$APPLE_KEYCHAIN_PATH"

      - name: Build desktop bundle
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY || '' }}
          SIGN_LINUX_APPIMAGE: ${{ runner.os == 'Linux' && inputs.sign_linux_appimage && 'true' || 'false' }}
          LINUX_SIGNING_KEY_ID: ${{ runner.os == 'Linux' && inputs.sign_linux_appimage && secrets.LINUX_SIGNING_KEY_ID || '' }}
          LINUX_SIGNING_KEY_PASSPHRASE: ${{ runner.os == 'Linux' && inputs.sign_linux_appimage && secrets.LINUX_SIGNING_KEY_PASSPHRASE || '' }}
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" && -n "${APPLE_ID}" && -n "${APPLE_PASSWORD}" ]]; then
            unset APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PATH
          fi
          if [[ "$RUNNER_OS" == "Linux" && "${SIGN_LINUX_APPIMAGE}" == "true" ]]; then
            if [[ -z "${LINUX_SIGNING_KEY_PASSPHRASE}" ]]; then
              echo "sign_linux_appimage=true requires LINUX_SIGNING_KEY_PASSPHRASE" >&2
              exit 1
            fi
            export SIGN=1
            export APPIMAGETOOL_SIGN_PASSPHRASE="$LINUX_SIGNING_KEY_PASSPHRASE"
            if [[ -n "${LINUX_SIGNING_KEY_ID}" ]]; then
              export SIGN_KEY="$LINUX_SIGNING_KEY_ID"
            fi
          fi
          cd crates/tine-app
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            export APPIMAGE_EXTRACT_AND_RUN=1
            set +e
            cargo tauri build --config tauri.conf.json 2>&1 | tee "$RUNNER_TEMP/tauri-build.log"
            status=${PIPESTATUS[0]}
            set -e
            if [[ $status -ne 0 ]]; then
              echo "::group::Linux desktop bundle diagnostics"
              du -sh resources/runtime resources/runtime/python 2>/dev/null || true
              find resources/runtime -maxdepth 3 | sort | head -n 200 || true
              find target/release/bundle -maxdepth 3 | sort | head -n 200 || true
              if [[ -f resources/runtime/.fetched-runtime.json ]]; then
                cat resources/runtime/.fetched-runtime.json
              fi
              echo "::endgroup::"
              exit $status
            fi
          else
            cargo tauri build -vv --config tauri.conf.json
          fi

      - name: Resolve version and built bundle paths
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path('packaging/python/pyproject.toml').read_text()
          print(re.search(r'(?m)^\[project\]\s*(?:.*\n)*?version = "([^"]+)"', text).group(1))
          PY
          )"
          BUNDLE_PATH="$(compgen -G '${{ matrix.artifact_glob }}' | head -n 1)"
          if [[ -z "$BUNDLE_PATH" ]]; then
            echo "expected bundle matching ${{ matrix.artifact_glob }}" >&2
            exit 1
          fi
          EXT="${BUNDLE_PATH##*.}"
          CANONICAL_PATH="release-artifacts/tine-app-${VERSION}-${{ matrix.label }}.${EXT}"
          mkdir -p release-artifacts
          cp "$BUNDLE_PATH" "$CANONICAL_PATH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bundle_path=$CANONICAL_PATH" >> "$GITHUB_OUTPUT"

      - name: Extract Windows MSI for smoke
        id: windows_msi
        if: matrix.smoke && runner.os == 'Windows'
        shell: pwsh
        run: |
          $installRoot = Join-Path $PWD 'target\msi-smoke'
          if (Test-Path $installRoot) {
            Remove-Item -Path $installRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $installRoot | Out-Null

          $msiPath = (Resolve-Path '${{ steps.bundle.outputs.bundle_path }}').Path
          $targetDir = (Resolve-Path $installRoot).Path

          Start-Process msiexec.exe -ArgumentList @('/a', $msiPath, '/qn', "TARGETDIR=$targetDir") -Wait -NoNewWindow

          $exe = Get-ChildItem -Path $targetDir -Filter 'tine-app.exe' -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) {
            throw "expected installed tine-app.exe under $targetDir"
          }

          "launch_path=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Smoke desktop app bundle (macOS)
        if: matrix.smoke && runner.os == 'macOS'
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.bundle.outputs.bundle_path }}
        run: |
          set -euo pipefail

          MOUNT_ROOT="$RUNNER_TEMP/tine-dmg-mount"
          mkdir -p "$MOUNT_ROOT"

          hdiutil attach "$BUNDLE_PATH" -nobrowse -readonly -mountpoint "$MOUNT_ROOT"
          cleanup() {
            hdiutil detach "$MOUNT_ROOT" -force >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          APP_PATH="$(find "$MOUNT_ROOT" -maxdepth 2 -name '*.app' | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "expected .app inside mounted DMG" >&2
            exit 1
          fi

          # Copy out of read-only volume and strip quarantine for CI
          SMOKE_DIR="$RUNNER_TEMP/tine-smoke-app"
          mkdir -p "$SMOKE_DIR"
          cp -R "$APP_PATH" "$SMOKE_DIR/"
          APP_COPY="$SMOKE_DIR/$(basename "$APP_PATH")"
          xattr -cr "$APP_COPY"

          LAUNCH_PATH="$(find "$APP_COPY/Contents/MacOS" -type f | head -n 1)"
          if [[ -z "$LAUNCH_PATH" ]]; then
            echo "expected launchable binary inside $APP_COPY" >&2
            exit 1
          fi

          python3 scripts/release/smoke_app.py \
            --bundle-path "$BUNDLE_PATH" \
            --launch-path "$LAUNCH_PATH" \
            --server-port 40113 \
            --require-bundled-python \
            --doctor-runtime \
            --health-only

      - name: Smoke desktop app (Linux)
        if: matrix.smoke && runner.os == 'Linux'
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.bundle.outputs.bundle_path }}
        run: |
          chmod +x "$BUNDLE_PATH"
          xvfb-run -a python3 scripts/release/smoke_app.py --bundle-path "$BUNDLE_PATH" --launch-path "$BUNDLE_PATH" --server-port 40113 --require-bundled-python --doctor-runtime --health-only

      - name: Validate signed AppImage
        if: matrix.smoke && runner.os == 'Linux' && inputs.sign_linux_appimage
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.bundle.outputs.bundle_path }}
        run: |
          set -euo pipefail
          VALIDATE_TOOL="$RUNNER_TEMP/validate-x86_64.AppImage"
          curl --fail --location --retry 5 --silent --show-error \
            --output "$VALIDATE_TOOL" \
            https://github.com/AppImageCommunity/AppImageUpdate/releases/download/continuous/validate-x86_64.AppImage
          chmod +x "$VALIDATE_TOOL" "$BUNDLE_PATH"
          APPIMAGE_EXTRACT_AND_RUN=1 "$BUNDLE_PATH" --appimage-signature
          APPIMAGE_EXTRACT_AND_RUN=1 "$VALIDATE_TOOL" "$BUNDLE_PATH"

      - name: Smoke desktop app (Windows)
        if: matrix.smoke && runner.os == 'Windows'
        shell: pwsh
        env:
          BUNDLE_PATH: ${{ steps.bundle.outputs.bundle_path }}
          LAUNCH_PATH: ${{ steps.windows_msi.outputs.launch_path }}
        run: python scripts/release/smoke_app.py --bundle-path "$env:BUNDLE_PATH" --launch-path "$env:LAUNCH_PATH" --server-port 40113 --require-bundled-python --doctor-runtime --health-only

      - name: Generate checksum
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' "${{ steps.bundle.outputs.bundle_path }}"
          import hashlib
          import sys
          from pathlib import Path

          bundle_path = Path(sys.argv[1])
          digest = hashlib.sha256(bundle_path.read_bytes()).hexdigest()
          bundle_path.with_suffix(bundle_path.suffix + ".sha256").write_text(
              f"{digest}  {bundle_path.name}\n"
          )
          PY

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-${{ matrix.label }}
          path: |
            ${{ steps.bundle.outputs.bundle_path }}
            ${{ steps.bundle.outputs.bundle_path }}.sha256

  upload-release-assets:
    name: Upload desktop release assets
    needs: build-bundle
    runs-on: ubuntu-latest
    if: inputs.publish_to_release
    steps:
      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if [[ -z "$TAG" ]]; then
            echo "publish_to_release requires release_tag" >&2
            exit 1
          fi

          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=Desktop App $TAG" >> "$GITHUB_OUTPUT"
          echo "draft=true" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"

      - name: Download desktop bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-app-*
          merge-multiple: true

      - name: Upload desktop release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.release_meta.outputs.draft }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: |
            release-artifacts/*
